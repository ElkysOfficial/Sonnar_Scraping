<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="600" fill="#FFFFFF"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="gridTwitter" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F3F4F6" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#gridTwitter)"/>

  <!-- Accent decoration -->
  <circle cx="1150" cy="50" r="150" fill="#2563EB" opacity="0.03"/>
  <circle cx="50" cy="550" r="100" fill="#25D366" opacity="0.03"/>

  <!-- Left side content -->
  <g transform="translate(80, 0)">
    <!-- Logo -->
    <g transform="translate(0, 70)">
      <rect width="44" height="44" rx="9" fill="#2563EB"/>
      <text x="22" y="30" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">S</text>
      <text x="60" y="30" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Sonnar</text>
    </g>

    <!-- Main headline -->
    <text x="0" y="200" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#111827">Vagas do seu stack.</text>
    <text x="0" y="260" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#111827">Direto no WhatsApp.</text>

    <!-- Subheadline -->
    <text x="0" y="320" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B7280">Monitoramos 16+ fontes e enviamos</text>
    <text x="0" y="346" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B7280">apenas vagas relevantes para o seu perfil.</text>
    <text x="0" y="372" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B7280">Sem duplicatas, sem ruído.</text>

    <!-- CTA Badge -->
    <rect x="0" y="410" width="170" height="42" rx="21" fill="#2563EB"/>
    <text x="85" y="437" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">Começar agora</text>

    <!-- Social proof -->
    <text x="0" y="500" font-family="Inter, Arial, sans-serif" font-size="14" fill="#9CA3AF">1.247 devs recebendo vagas esta semana</text>

    <!-- URL -->
    <text x="0" y="555" font-family="Inter, Arial, sans-serif" font-size="15" fill="#9CA3AF">sonnar.com.br</text>
  </g>

  <!-- Phone mockup - right side, full size to fit completely -->
  <g transform="translate(875, 30) scale(0.947)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="280" height="570" rx="45" fill="#E5E7EB"/>
    <rect x="1" y="1" width="278" height="568" rx="44" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
    <rect x="8" y="8" width="264" height="554" rx="38" fill="#0B141A"/>

    <!-- Dynamic Island -->
    <rect x="90" y="18" width="100" height="30" rx="15" fill="#000"/>
    <circle cx="170" cy="33" r="4" fill="#1a1a1a"/>

    <!-- WhatsApp header -->
    <rect x="14" y="56" width="252" height="50" fill="#1F2C34"/>
    <circle cx="42" cy="81" r="15" fill="#2563EB"/>
    <text x="42" y="86" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">S</text>
    <text x="66" y="77" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#E9EDEF">Sonnar</text>
    <text x="66" y="92" font-family="Inter, Arial, sans-serif" font-size="10" fill="#25D366">digitando...</text>

    <!-- Message 1 -->
    <g transform="translate(14, 116)">
      <rect width="230" height="95" rx="8" fill="#1F2C34"/>
      <text x="10" y="18" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="600" fill="#25D366">NOVA VAGA · REMOTO · CLT</text>
      <text x="10" y="36" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#E9EDEF">Senior Frontend Developer</text>
      <text x="10" y="52" font-family="Inter, Arial, sans-serif" font-size="11" fill="#8696A0">Nubank</text>
      <rect x="10" y="60" width="40" height="16" rx="4" fill="rgba(255,255,255,0.1)"/>
      <text x="30" y="72" font-family="Inter, Arial, sans-serif" font-size="8" fill="#8696A0" text-anchor="middle">React</text>
      <rect x="54" y="60" width="55" height="16" rx="4" fill="rgba(255,255,255,0.1)"/>
      <text x="81" y="72" font-family="Inter, Arial, sans-serif" font-size="8" fill="#8696A0" text-anchor="middle">TypeScript</text>
      <text x="10" y="88" font-family="Inter, Arial, sans-serif" font-size="9" fill="#8696A0">R$ 18.000 - R$ 24.000</text>
    </g>

    <!-- Message 2 -->
    <g transform="translate(14, 221)">
      <rect width="230" height="95" rx="8" fill="#1F2C34"/>
      <text x="10" y="18" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="600" fill="#25D366">NOVA VAGA · HÍBRIDO · SP</text>
      <text x="10" y="36" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#E9EDEF">Full Stack Engineer</text>
      <text x="10" y="52" font-family="Inter, Arial, sans-serif" font-size="11" fill="#8696A0">iFood</text>
      <rect x="10" y="60" width="40" height="16" rx="4" fill="rgba(255,255,255,0.1)"/>
      <text x="30" y="72" font-family="Inter, Arial, sans-serif" font-size="8" fill="#8696A0" text-anchor="middle">React</text>
      <rect x="54" y="60" width="45" height="16" rx="4" fill="rgba(255,255,255,0.1)"/>
      <text x="76" y="72" font-family="Inter, Arial, sans-serif" font-size="8" fill="#8696A0" text-anchor="middle">Python</text>
      <text x="10" y="88" font-family="Inter, Arial, sans-serif" font-size="9" fill="#8696A0">R$ 15.000 - R$ 20.000</text>
    </g>

    <!-- Message 3 -->
    <g transform="translate(14, 326)">
      <rect width="230" height="95" rx="8" fill="#1F2C34"/>
      <text x="10" y="18" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="600" fill="#25D366">NOVA VAGA · REMOTO · PJ</text>
      <text x="10" y="36" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#E9EDEF">Backend Engineer</text>
      <text x="10" y="52" font-family="Inter, Arial, sans-serif" font-size="11" fill="#8696A0">Mercado Livre</text>
      <rect x="10" y="60" width="35" height="16" rx="4" fill="rgba(255,255,255,0.1)"/>
      <text x="27" y="72" font-family="Inter, Arial, sans-serif" font-size="8" fill="#8696A0" text-anchor="middle">Java</text>
      <rect x="49" y="60" width="40" height="16" rx="4" fill="rgba(255,255,255,0.1)"/>
      <text x="69" y="72" font-family="Inter, Arial, sans-serif" font-size="8" fill="#8696A0" text-anchor="middle">Spring</text>
      <text x="10" y="88" font-family="Inter, Arial, sans-serif" font-size="9" fill="#8696A0">R$ 20.000 - R$ 28.000</text>
    </g>

    <!-- Message 4 (partial) -->
    <g transform="translate(14, 431)">
      <rect width="230" height="70" rx="8" fill="#1F2C34"/>
      <text x="10" y="18" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="600" fill="#25D366">NOVA VAGA · REMOTO · CLT</text>
      <text x="10" y="36" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#E9EDEF">React Native Developer</text>
      <text x="10" y="52" font-family="Inter, Arial, sans-serif" font-size="11" fill="#8696A0">PicPay</text>
    </g>

    <!-- Fade at bottom -->
    <defs>
      <linearGradient id="phoneFadeTwitter" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#0B141A;stop-opacity:0"/>
        <stop offset="100%" style="stop-color:#0B141A;stop-opacity:1"/>
      </linearGradient>
    </defs>
    <rect x="8" y="480" width="264" height="82" fill="url(#phoneFadeTwitter)"/>
  </g>
</svg>
