name: Web - Security

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-security.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-security.yml'
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/web

jobs:
  deps:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high
