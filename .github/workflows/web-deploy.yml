name: Web - Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-deploy.yml'
  workflow_dispatch:
    inputs:
      confirm:
        description: "Deploy to production? (yes/no)"
        required: true
        default: "no"

permissions:
  contents: read

concurrency:
  group: web-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PRODUCT_NAME: "Sonnar Jobs"
  SITE_URL: "https://sonnarjobs.com.br"
  TZ: "America/Sao_Paulo"

defaults:
  run:
    working-directory: apps/web

jobs:
  build-and-deploy:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.confirm == 'yes'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Create .env file
        run: |
          echo "VITE_INVERTEXTO_TOKEN=${{ secrets.VITE_INVERTEXTO_TOKEN }}" >> .env
          echo "VITE_INVERTEXTO_BASE=https://api.invertexto.com/v1" >> .env

      - name: Build
        run: npm run build

      - name: Deploy via FTP (Hostinger)
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./apps/web/dist/
          server-dir: /public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Post-deploy smoke check
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          for i in {1..12}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${SITE_URL}" || true)
            if [[ "$code" == "200" || "$code" == "301" || "$code" == "302" ]]; then
              echo "OK: $code"
              exit 0
            fi
            echo "waiting... code=$code"
            sleep 5
          done
          echo "Smoke check failed"
          exit 1

      - name: Timestamp
        id: timestamp
        working-directory: .
        run: |
          echo "date=$(date +'%d/%m/%Y')" >> $GITHUB_OUTPUT
          echo "time=$(date +'%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Notify Discord (always)
        if: always()
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          content: |
            **${{ env.PRODUCT_NAME }} - Deploy**
            **Status:** ${{ job.status == 'success' && '✅ Sucesso' || '❌ Falha' }}
            **Repo:** `${{ github.repository }}`
            **Branch:** `${{ github.ref_name }}`
            **Workflow:** `${{ github.workflow }} #${{ github.run_number }}`
            **Trigger:** `${{ github.event_name }}`
            **Commit:** `${{ github.sha }}`
            **Mensagem:** `${{ github.event.head_commit.message }}`
            **Autor (commit):** `${{ github.event.head_commit.author.name }}`
            **Actor:** `${{ github.actor }}`
            **Runner:** `${{ runner.os }}` / `${{ runner.arch }}`

            **Data/Hora:** ${{ steps.timestamp.outputs.date }} ${{ steps.timestamp.outputs.time }}

            🔗 **Site:** ${{ env.SITE_URL }}
            🔗 **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            🔗 **Commit:** ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
