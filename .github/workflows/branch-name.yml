name: Branch name (git-flow)

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name follows git-flow
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          set -e
          echo "Branch: $BRANCH"
          if [[ "$BRANCH" =~ ^(main|develop|master)$ ]]; then
            echo "Long-lived branch, skipping."
            exit 0
          fi
          if [[ ! "$BRANCH" =~ ^(feature|release|hotfix|bugfix|support|chore|docs)\/[a-z0-9._-]+$ ]]; then
            echo "::error::Branch '$BRANCH' nao segue o padrao git-flow."
            echo "Use: feature/<slug>, release/<slug>, hotfix/<slug>, bugfix/<slug>, support/<slug>, chore/<slug>, docs/<slug>"
            echo "Slug em kebab-case (a-z, 0-9, ponto, underline, hifen)."
            exit 1
          fi
          echo "OK"
