<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!--
      Content Security Policy - defesa em profundidade contra XSS.

      ATENÇÃO - trade-off de segurança assumido: o Google AdSense (anúncios
      no dashboard) NÃO é compatível com uma CSP estrita. O runtime de
      anúncios injeta scripts inline e usa eval, então 'unsafe-inline' e
      'unsafe-eval' tiveram de ser adicionados ao script-src. Isso enfraquece
      a proteção contra XSS: como o JWT vive em localStorage (Supabase Auth
      padrão SPA), um script injetado ainda conseguiria exfiltrar a sessão.
      Os hashes dos blocos JSON-LD foram removidos porque, na presença de
      hash/nonce, o navegador IGNORA 'unsafe-inline' — e o AdSense precisa
      dele. Se os anúncios forem removidos no futuro, reverter script-src
      para 'self' + hashes dos 2 blocos JSON-LD e recolocar a proteção.

      script-src: 'self' + AdSense (googlesyndication / googleadservices /
        doubleclick / google.com). 'unsafe-inline' cobre os blocos JSON-LD
        e os scripts do AdSense; 'unsafe-eval' é exigido pelo runtime de ads.
      style-src: mantém 'unsafe-inline' porque Vue/Vite injetam style
        attributes em runtime (impacto de XSS em CSS é baixo).
      connect-src: Supabase REST + Realtime + Stripe API + ViaCEP + telemetria
        do AdSense (beacons / ad traffic quality).
      frame-src: Stripe Checkout + iframes de criativos do AdSense + diálogo
        de consentimento da CMP do Google (fundingchoicesmessages).
      frame-ancestors NÃO funciona via meta - vive no .htaccess (X-Frame-Options DENY).
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.googlesyndication.com https://partner.googleadservices.com https://*.doubleclick.net https://*.google.com https://*.adtrafficquality.google;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob: https:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://viacep.com.br https://*.googlesyndication.com https://*.doubleclick.net https://*.google.com https://*.adtrafficquality.google;
      frame-src https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com https://*.googlesyndication.com https://*.doubleclick.net https://www.google.com https://*.adtrafficquality.google https://fundingchoicesmessages.google.com;
      worker-src 'self' blob:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    " />
    <meta
      name="description"
      content="Sonnar - Vagas do seu stack, direto no WhatsApp. Monitoramos 16+ fontes e enviamos apenas vagas relevantes para o seu perfil. Sem duplicatas, sem ruído."

    <meta

      content="vagas, emprego, tecnologia, dev, programador, desenvolvedor, whatsapp, bot, carreira, react, node, python, java, remoto, clt, pj"
    />

      abaixo. O `ads.txt` (em /public/ads.txt) complementa essa declaracao
      do publisher.

    <meta name="google-adsense-account" content="ca-pub-7896888594916293" />

    <!-- Critical CSS inline para LCP - estilos do hero renderizam sem bloqueio -->
    <style>
      /* Fallback fonts com métricas similares ao Inter para prevenir CLS */
      body {
        margin: 0;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #app {
        min-height: 100vh;
      }
      /* Hero critical styles para LCP */
      .hero {
        padding: clamp(5rem, 12vh, 7.5rem) 0 clamp(3rem, 8vh, 5rem);
      }
      .hero-title {
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 700;
        line-height: 1.1;
        margin-bottom: clamp(1rem, 3vw, 1.5rem);
      }
      .hero-subtitle {
        font-size: clamp(1rem, 2vw, 1.25rem);
        line-height: 1.6;
        margin-bottom: clamp(1.5rem, 4vw, 2rem);
      }
      .container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 clamp(1rem, 4vw, 2rem);
      }
    </style>
